name: MTM Prod Image

on:
  push:
    branches:
      - prod
      - tpf
  workflow_dispatch:

concurrency:
  group: mtm-prod-image-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'tpf' && 'tpf-prod' || 'prod' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: image_meta
        shell: bash
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_repo=ghcr.io/${owner_lc}/mtm" >> "$GITHUB_OUTPUT"
          
          if [ "${{ github.ref_name }}" = "tpf" ]; then
            prefix="tpf-prod"
          else
            prefix="prod"
          fi
          echo "prefix=${prefix}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${prefix}-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push MTM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            VITE_API_URL=
            VITE_GATEWAY_API_URL=
            VITE_UI_TENANT=${{ github.ref_name == 'tpf' && 'tpf' || 'epikx' }}
            VITE_DEFAULT_TENANT=${{ github.ref_name == 'tpf' && vars.TPF_VITE_TENANT || (vars.PROD_VITE_TENANT != '' && vars.PROD_VITE_TENANT || 'x1-epik-pay') }}
            NGINX_CONF=nginx.compose.conf
          push: true
          tags: |
            ${{ steps.image_meta.outputs.image_repo }}:${{ steps.image_meta.outputs.prefix }}
            ${{ steps.image_meta.outputs.image_repo }}:${{ steps.image_meta.outputs.sha_tag }}
