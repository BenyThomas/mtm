name: Deploy mTM Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mtm-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat
    env:
      DEPLOY_HOST: 45.33.54.133
      VITE_API_URL: ${{ secrets.VITE_API_URL != '' && secrets.VITE_API_URL || 'https://fineract.epikx.co.tz/fineract-provider' }}
      VITE_GATEWAY_API_URL: ${{ secrets.VITE_GATEWAY_API_URL != '' && secrets.VITE_GATEWAY_API_URL || 'https://digital.epikx.co.tz' }}
      VITE_TENANT: ${{ secrets.VITE_TENANT != '' && secrets.VITE_TENANT || 'default' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Package dist
        run: tar -I 'gzip -1' -cf mtm-dist.tar.gz -C dist .

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 20 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts || true

      - name: Upload artifact to server
        shell: bash
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new mtm-dist.tar.gz \
            "${{ secrets.DEPLOY_SSH_USER }}@$DEPLOY_HOST:/tmp/mtm-dist.tar.gz"

      - name: Deploy artifact on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new "${{ secrets.DEPLOY_SSH_USER }}@$DEPLOY_HOST" <<'REMOTE'
            set -euo pipefail
            sudo mkdir -p /var/www/bo.epikx.co.tz
            sudo tar -xzf /tmp/mtm-dist.tar.gz -C /var/www/bo.epikx.co.tz
            sudo chown -R www-data:www-data /var/www/bo.epikx.co.tz
            rm -f /tmp/mtm-dist.tar.gz
            sudo nginx -t
            sudo systemctl reload nginx
          REMOTE
